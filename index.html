<!DOCTYPE html>
<html>
<head>
  <title>My Real AI</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    input {
      padding: 10px;
      width: 60%;
    }

    button {
      padding: 10px;
      background: green;
      color: white;
      border: none;
    }

    #chat {
      margin-top: 20px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .msg {
      margin: 10px 0;
    }
  </style>
</head>
<body>

<h2>My AI 🤖</h2>

<input id="input" placeholder="Ask anything..." />
<button onclick="askAI()">Send</button>

<div id="chat"></div>

<script>
async function askAI() {
  let input = document.getElementById("input");
  let text = input.value;

  if (!text) return;

  addMessage("You: " + text);

  input.value = "";

  const res = await fetch("/ask", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  addMessage("AI: " + data.reply);
}

function addMessage(text) {
  let chat = document.getElementById("chat");

  let div = document.createElement("div");
  div.className = "msg";
  div.textContent = text;

  chat.appendChild(div);
}
</script>

</body>
  </html>
